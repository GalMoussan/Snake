<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Classic Snake game built with TypeScript and HTML5 Canvas" />
    <title>Snake Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="game-container">
      <h1 class="game-title">SNAKE</h1>
      <div class="score-display">
        <span id="currentScore">Score: 0</span>
        <span id="highScore">High Score: 0</span>
      </div>
      <canvas id="gameCanvas" width="600" height="400"></canvas>
      <div class="controls">
        <div class="button-group">
          <button id="startBtn" class="game-button">Start</button>
          <button id="pauseBtn" class="game-button" disabled>Pause</button>
        </div>
        <p class="instructions">Use Arrow Keys or WASD to move</p>
        <p class="instructions">Press SPACE to start/pause</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
